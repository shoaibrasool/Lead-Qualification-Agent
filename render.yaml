services:
  - type: web
    name: lead-agent
    runtime: docker
    region: us-east-1
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: CALCOM_API_KEY
        sync: false
      - key: CALCOM_EVENT_TYPE_ID
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: MONGODB_CONNECTION_STRING
        sync: false
      - key: AUTO_BOOK_THRESHOLD
        value: "60"
      - key: FLAG_FOLLOWUP_THRESHOLD
        value: "40"
      - key: MAX_CONVERSATION_TURNS
        value: "8"
      - key: APP_ENV
        value: prod
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "https://lead-agent.onrender.com"
